name: Deploy standalone to GitHub Pages

# スタンドアロン版（単一HTML・自己完結）をGitHub Pagesへ公開する。
# フルサイト版はルート絶対パス前提のためPagesのサブパス配信では動かないが、
# スタンドアロン版はどのパスでも動くのでそのまま index.html として配信できる。
# リポジトリの Settings → Pages → Source を「GitHub Actions」にすると有効になる。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # 公開リポジトリでのみ実行（作業用リポではPagesを使わない）
    if: github.repository == 'sa-san10/nyamuru-manga-name-studio'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:standalone
      - name: Collect pages artifact
        run: |
          mkdir -p pages
          # OGP用の絶対URLをリポジトリ情報から組み立てて埋め込む（ソースにはドメインを置かない）
          base="https://${GITHUB_REPOSITORY%%/*}.github.io/${GITHUB_REPOSITORY#*/}"
          sed "s|__PAGES_BASE__|${base}|g" standalone/pages-loader.html > pages/index.html
          cp dist-standalone/index.html pages/app.html
          # ローダーがdocument.write()でapp.htmlに差し替えた後もmanifest宣言が残るよう、
          # Pages版のapp.htmlにだけmanifestリンクを注入する（配布用スタンドアロン版には入れない）
          sed -i 's|<meta name="theme-color" content="#FFB3BA" />|<meta name="theme-color" content="#FFB3BA" />\n    <link rel="manifest" href="./manifest.webmanifest" />|' pages/app.html
          grep -q 'rel="manifest"' pages/app.html || { echo "manifest注入に失敗"; exit 1; }
          cp dist-standalone/THIRD_PARTY_NOTICES.txt pages/THIRD_PARTY_NOTICES.txt
          cp public/ogp.png pages/ogp.png
          cp public/icons/icon-192.png pages/icon-192.png
          cp public/icons/icon-512.png pages/icon-512.png
          # PWA用（サブパス配信前提の相対パス版manifest・SW）
          cp standalone/pages-manifest.webmanifest pages/manifest.webmanifest
          cp standalone/pages-sw.js pages/sw.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    if: github.repository == 'sa-san10/nyamuru-manga-name-studio'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
