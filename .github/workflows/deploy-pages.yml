name: Deploy standalone to GitHub Pages

# スタンドアロン版（単一HTML・自己完結）をGitHub Pagesへ公開する。
# フルサイト版はルート絶対パス前提のためPagesのサブパス配信では動かないが、
# スタンドアロン版はどのパスでも動くのでそのまま index.html として配信できる。
# リポジトリの Settings → Pages → Source を「GitHub Actions」にすると有効になる。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # 公開リポジトリでのみ実行（作業用リポではPagesを使わない）
    if: github.repository == 'sa-san10/nyamuru-manga-name-studio'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:standalone
      - name: Collect pages artifact
        run: |
          mkdir -p pages
          cp standalone/pages-loader.html pages/index.html
          cp dist-standalone/index.html pages/app.html
          cp dist-standalone/THIRD_PARTY_NOTICES.txt pages/THIRD_PARTY_NOTICES.txt
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    if: github.repository == 'sa-san10/nyamuru-manga-name-studio'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
