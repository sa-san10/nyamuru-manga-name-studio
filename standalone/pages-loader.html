<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FFB3BA" />
    <meta name="description" content="Nyamuru🐱Manga Name Studio（GitHub Pages版）を読み込み中" />
    <title>Nyamuru🐱Manga Name Studio を読み込み中…</title>
    <style>
      body { margin: 0; min-height: 100dvh; display: grid; place-items: center; background: linear-gradient(135deg, #fff0f3, #f0f8ff); font-family: Inter, "Noto Sans JP", "Yu Gothic UI", "Hiragino Sans", sans-serif; color: #47434c; }
      .loader { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px; text-align: center; }
      .cat { font-size: 56px; animation: bounce 1s ease-in-out infinite; }
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
      h1 { margin: 0; font-size: 17px; }
      p { margin: 0; color: #7b8190; font-size: 12px; }
      .bar { width: min(280px, 70vw); height: 10px; overflow: hidden; border: 1px solid #ffb3ba; border-radius: 999px; background: #fff; }
      .bar i { display: block; width: 0%; height: 100%; border-radius: 999px; background: linear-gradient(90deg, #ffb3ba, #ff6b81); transition: width .2s; }
      .bar.indeterminate i { width: 40%; animation: slide 1.1s ease-in-out infinite; }
      @keyframes slide { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
      a { color: #e64f68; font-weight: 700; }
      @media (prefers-reduced-motion: reduce) { .cat, .bar.indeterminate i { animation: none; } }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="cat" aria-hidden="true">🐱</div>
      <h1>Nyamuru🐱Manga Name Studio</h1>
      <p id="status">にゃむるたんを召喚中…</p>
      <div class="bar" id="bar" role="progressbar" aria-label="読み込み進捗"><i id="fill"></i></div>
      <p id="fallback" hidden>自動で切り替わらない場合は <a href="./app.html">こちら</a> からどうぞ</p>
    </div>
    <script>
      (async () => {
        const status = document.getElementById('status');
        const bar = document.getElementById('bar');
        const fill = document.getElementById('fill');
        const fallback = document.getElementById('fallback');
        try {
          const response = await fetch('./app.html');
          if (!response.ok) throw new Error(String(response.status));
          const total = Number(response.headers.get('Content-Length')) || 0;
          let html = '';
          if (response.body && total) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let received = 0;
            for (;;) {
              const { done, value } = await reader.read();
              if (done) break;
              received += value.byteLength;
              html += decoder.decode(value, { stream: true });
              fill.style.width = Math.min(99, Math.round((received / total) * 100)) + '%';
            }
            html += decoder.decode();
          } else {
            bar.classList.add('indeterminate');
            html = await response.text();
          }
          fill.style.width = '100%';
          status.textContent = '起動するにゃ！';
          document.open();
          document.write(html);
          document.close();
        } catch {
          status.textContent = '読み込みに失敗しました…';
          fallback.hidden = false;
        }
      })();
    </script>
  </body>
</html>
